{% extends "base.html" %}

{% block content %}
<div class="item-container">
    {% for item in items %}
        <div class="item-card">
            <img src="/static/img/{{ item.image }}">
            <h3>{{ item.name }}</h3>
            <h5>{{ item.price }}</h5>
        </div>
    {% endfor %}
</div>
{% endblock %}
